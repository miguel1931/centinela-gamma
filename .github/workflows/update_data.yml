name: Update Centinela Data

on:
  schedule:
    - cron: '0 */6 * * *' # Every 6 hours
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Data Extraction
        env:
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
        run: |
          cd src
          python centinela_gamma_maximized.py

      - name: Run Data Processing
        run: |
          cd src
          python palestine_tweets_processor.py

      - name: Commit and Push changes
        run: |
          git config --global user.name 'Centinela Bot'
          git config --global user.email 'bot@centinela-gamma.local'
          git add dashboard/data.json
          git commit -m "🤖 Auto-update dashboard data [skip ci]" || echo "No changes to commit"
          git push
